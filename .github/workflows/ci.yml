name: CI

on:
  push:
    branches: [main]
  # Every pull request, not only those targeting main. The base-branch filter
  # silently skipped CI on stacked PRs — a change based on another open branch
  # got no checks at all, which looks identical to "no checks configured".
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      # Deliberately NOT installing the `market` extra: CI must never depend on
      # a live market-data feed (ADR 2026-07-22 §1). Network tests are marked
      # and deselected by pytest addopts.
      - name: Install package
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Ruff check
        run: ruff check src tests

      - name: Pytest (network tests deselected)
        run: pytest -q

      - name: Ingest runs offline
        run: smm ingest --as-of 2024-01-26 --cache-dir "${RUNNER_TEMP}/smm-cache"
