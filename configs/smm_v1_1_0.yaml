# SMM-V1.1.0 frozen execution parameters
# Source: SMM-V1.0.0 + accepted M6 contract + issue #24 Task Reviewer decision.
# This is a new strategy identity; it must not overwrite historical V1.0.0 runs.

strategy:
  name: Swing Momentum Scanner
  version: SMM-V1.1.0
  direction: long_only
  timeframe: daily
  execution_mode: paper_trading
  auto_live_orders: false

universe:
  primary:
    - SP500
    - NASDAQ100_UNIQUE
  min_price: 10.0
  min_avg_dollar_volume_20d: 20000000.0
  # Fail closed when the newest snapshot <= as_of is older than this.
  max_snapshot_age_days: 90

# Deterministic provider-boundary retry policy. Total attempts include the
# initial request; there is deliberately no jitter.
market_data_retry:
  max_attempts: 3
  backoff_seconds: [2, 8]

# Data-quality thresholds (constitution §12.4). Governance guards, not strategy
# rules: changing these moves config_hash but does not bump the version.
validation:
  max_abs_daily_return: 0.50        # |close/prev_close - 1| above this stops the run
  max_volume_spike_ratio: 25.0      # vs the series median
  volume_spike_verification:
    policy: official_sp500_nasdaq100_constituent_change_v2
    allowed_indexes: ["S&P 500", "Nasdaq-100"]
    allowed_actions: [addition, deletion]
    session_offsets: [-1, 0]
    allowed_source_hosts_by_index:
      "S&P 500": [press.spglobal.com, www.spglobal.com]
      "Nasdaq-100": [ir.nasdaq.com, www.nasdaq.com]
  price_jump_verification:
    policy: edgar_8k_item_1_01_v1
    allowed_forms: ["8-K"]
    allowed_items: ["1.01"]
    allowed_source_hosts: [www.sec.gov]
    allowed_identity_source_hosts: [ir.echostar.com, www.nasdaq.com, www.sec.gov]
    exchange_timezone: America/New_York
    regular_close: "16:00"
  official_bar_supplement:
    policy: official_exchange_isolated_missing_bar_v1
    max_missing_sessions_per_symbol: 1
    allowed_bar_source_hosts: [api.nasdaq.com]
    allowed_identity_source_hosts: [www.sec.gov]
    adjustment_method: adjacent_provider_equal_close_v1
  max_session_gap_weekdays: 5       # weekdays missing between consecutive bars
  min_adj_factor: 0.05
  adj_factor_tolerance: 0.000001
  split_ratio_tolerance: 0.03       # how near an integer ratio counts as a split step

# Feature windows (ADR M2). Governance-adjacent but strategy-shaping: these
# define what the indicators mean, so a change moves config_hash.
features:
  min_history_bars: 252     # 52-week high is the binding window
  sma_fast: 50
  sma_slow: 200
  ema_window: 20
  atr_window: 20
  slope_window: 20
  return_windows: [21, 63, 126]
  high_window: 252
  drawdown_window: 63
  dollar_volume_window: 20

# Constitution §18.2: sector RS is measured against a real sector ETF, not a
# synthetic peer median. Keys must match the snapshot's `sector` column exactly.
sector_benchmarks:
  information_technology: XLK
  financials: XLF
  health_care: XLV
  consumer_discretionary: XLY
  consumer_staples: XLP
  energy: XLE
  industrials: XLI
  materials: XLB
  utilities: XLU
  real_estate: XLRE
  communication_services: XLC

market_regime:
  benchmark: SPY
  risk_on_conditions:
    - close_above_sma_200
    - close_above_sma_50
    - sma_50_above_sma_200

hard_filters:
  rules:
    - close_above_sma_50
    - close_above_sma_200
    - sma_50_above_sma_200
    - return_63_positive
    - return_126_positive
    - within_15_percent_of_52w_high
  max_distance_from_52w_high: 0.15

momentum:
  return_21_weight: 0.20
  return_63_weight: 0.30
  return_126_weight: 0.50

relative_strength:
  rs_spy_63_weight: 0.40
  rs_spy_126_weight: 0.40
  rs_sector_63_weight: 0.20

scoring:
  # V1: momentum-first; fundamental is filter, not primary score driver
  fund_as_filter: true
  momentum_weight: 0.50
  relative_strength_weight: 0.30
  trend_trigger_weight: 0.20
  fundamental_weight: 0.0

signal:
  breakout_window: 20
  relative_volume_min: 1.30
  watchlist_expire_bars: 20
  extension_filter_enabled: true
  max_extension_atr: 2.5

earnings:
  block_new_entries_before_days: 5
  hold_through_earnings: false

stop:
  type: setup_low_minus_atr_buffer
  atr_buffer: 0.20
  min_stop_distance_atr: 1.0
  max_stop_distance_atr: 2.5

risk:
  # Operational safety gate (M5 ADR): required, never defaults fail-open.
  new_entries_enabled: true
  risk_on_per_trade: 0.0050
  neutral_per_trade: 0.0025
  risk_off_per_trade: 0.0
  max_position_capital: 0.15
  max_portfolio_heat: 0.04
  max_sector_risk: 0.015
  max_risk_cluster_risk: 0.02
  risk_on_max_exposure: 1.0
  neutral_max_exposure: 0.5
  risk_off_max_exposure: 0.25
  # Constitution §35 circuit thresholds; V1.1 must not silently change them.
  daily_loss_pause_r: 4
  drawdown_reduce_at: 0.06
  drawdown_stop_at: 0.10
  # M7 data-governance guardrail: tolerate one missed run before expiry.
  # age is provider-session distance from trigger D to evaluation X.
  trigger_backlog_max_age_sessions: 3

exit:
  fixed_profit_target: false
  time_stop_days: 10
  time_stop_min_mfe_r: 0.5
  trailing_exit: close_below_ema_20
  pyramiding: false

execution:
  next_day_open: true
  max_open_gap_atr: 1.0
  # Conservative operational policy assumptions, not market measurements.
  # Recalibrate from measured fills before Stage C; M8 owns cost stress testing.
  half_spread_bps: 2.5
  entry_slippage_bps: 5.0
  exit_slippage_bps: 5.0
  commission_per_share: 0.005
